name: NotiJohn
options:
  bundleIdPrefix: com.onejacklee
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  NotiJohn:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NotiJohn
        excludes:
          - "**/.DS_Store"
    resources:
      - path: NotiJohn/Resources
        optional: true
    info:
      path: NotiJohn/Info.plist
      properties:
        CFBundleDisplayName: NotiJohn
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneConfigurationName: NotiJohn-CarPlay
                UISceneClassName: CPTemplateApplicationScene
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).CarPlaySceneDelegate
        UIBackgroundModes:
          - remote-notification
          - fetch
        NSUserNotificationsUsageDescription: NotiJohn forwards notifications to your CarPlay display so you can see messages while driving.
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onejacklee.notijohn
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: NotiJohn/NotiJohn.entitlements
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: NotiJohnNSE
        embed: true

  NotiJohnNSE:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NotiJohnNSE
    info:
      path: NotiJohnNSE/Info.plist
      properties:
        CFBundleDisplayName: NotiJohnNSE
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.onejacklee.notijohn.nse
        CODE_SIGN_ENTITLEMENTS: NotiJohnNSE/NotiJohnNSE.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
